services:
  - type: web
    name: wcag-learning-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: wcag-learning-db
          property: connectionString

databases:
  - name: wcag-learning-db
    plan: free
